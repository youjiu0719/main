<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快速連結</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif;
    background: #f2f2f7;
    min-height: 100vh;
    padding: 0 0 40px 0;
  }

  /* 頂部標題 */
  header {
    background: #fff;
    padding: 20px 20px 16px;
    border-bottom: 1px solid #e5e5ea;
    position: sticky;
    top: 0;
    z-index: 10;
    transition: box-shadow 0.3s;
  }
  header.scrolled {
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #1c1c1e;
    letter-spacing: 0.5px;
  }
  header p {
    font-size: 13px;
    color: #8e8e93;
    margin-top: 4px;
  }

  /* 卡片群組 */
  .list {
    margin: 20px 16px 0;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .item {
    display: flex;
    align-items: center;
    padding: 16px 18px;
    border-bottom: 1px solid #f2f2f7;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .item:last-child { border-bottom: none; }
  .item:active { background: #f2f2f7; }

  /* 圖示區 */
  .icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    margin-right: 14px;
  }
  .icon.green  { background: #d1f5e0; }
  .icon.blue   { background: #ddeeff; }
  .icon.orange { background: #ffe8d0; }
  .icon.purple { background: #ecdeff; }

  /* 文字區 */
  .info { flex: 1; min-width: 0; }
  .info .name {
    font-size: 16px;
    font-weight: 600;
    color: #1c1c1e;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .info .sub {
    font-size: 12px;
    color: #aeaeb2;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* 右側動作標籤 */
  .badge {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    flex-shrink: 0;
    margin-left: 10px;
  }
  .badge.copy { background: #e8f4ff; color: #007aff; }
  .badge.open { background: #fff0e0; color: #ff9500; }

  /* 複製成功 Toast */
  #toast {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(30,30,30,0.88);
    color: #fff;
    padding: 10px 22px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    white-space: nowrap;
    backdrop-filter: blur(8px);
    z-index: 999;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* 波紋效果 */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(0,122,255,0.12);
    animation: ripple-anim 0.5s ease-out forwards;
    pointer-events: none;
  }
  @keyframes ripple-anim {
    from { width: 0; height: 0; opacity: 1; }
    to   { width: 200px; height: 200px; opacity: 0; }
  }

  /* 成功打勾動畫覆蓋 */
  .check-flash {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%) scale(0);
    font-size: 20px;
    opacity: 0;
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s;
    pointer-events: none;
  }
  .check-flash.show {
    transform: translateY(-50%) scale(1);
    opacity: 1;
  }
</style>
</head>
<body>

<header id="header">
  <h1>🔗 快速連結</h1>
  <p>點一下即可複製連結或開啟頁面</p>
</header>

<div class="list">

  <!-- LINE 連結：複製 -->
  <div class="item" data-action="copy" data-url="https://lin.ee/uM2uJlC" onclick="handleClick(this, event)">
    <div class="icon green">💬</div>
    <div class="info">
      <div class="name">LINE 連結</div>
      <div class="sub">lin.ee/uM2uJlC</div>
    </div>
    <span class="badge copy">複製</span>
    <span class="check-flash">✅</span>
  </div>

  <!-- 出貨主控台：複製 -->
  <div class="item" data-action="copy" data-url="https://youjiu0719.github.io/minieyes.wld/" onclick="handleClick(this, event)">
    <div class="icon blue">📦</div>
    <div class="info">
      <div class="name">出貨主控台</div>
      <div class="sub">youjiu0719.github.io</div>
    </div>
    <span class="badge copy">複製</span>
    <span class="check-flash">✅</span>
  </div>

  <!-- 商品組圖：開啟 -->
  <div class="item" data-action="open" data-url="https://imgtok.com/zh-hans/gallery/fXJiMns" onclick="handleClick(this, event)">
    <div class="icon purple">🖼️</div>
    <div class="info">
      <div class="name">商品組圖</div>
      <div class="sub">imgtok.com</div>
    </div>
    <span class="badge open">開啟</span>
    <span class="check-flash">↗️</span>
  </div>

  <!-- 帳號資料：開啟圖片 -->
  <div class="item" data-action="open" data-url="https://file.vidhubfile.com/imgtok/post/33OtLKM/f_001.jpg" onclick="handleClick(this, event)">
    <div class="icon blue">🪪</div>
    <div class="info">
      <div class="name">帳號資料</div>
      <div class="sub">開啟圖片</div>
    </div>
    <span class="badge open">開啟</span>
    <span class="check-flash">↗️</span>
  </div>

  <!-- 滷饕賣貨便：複製 -->
  <div class="item" data-action="copy" data-url="https://myship.7-11.com.tw/general/detail/GM2606010302014" onclick="handleClick(this, event)">
    <div class="icon orange">🛒</div>
    <div class="info">
      <div class="name">滷饕賣貨便</div>
      <div class="sub">myship.7-11.com.tw</div>
    </div>
    <span class="badge copy">複製</span>
    <span class="check-flash">✅</span>
  </div>

</div>

<!-- Toast 提示 -->
<div id="toast">已複製！</div>

<script>
  // Sticky header shadow
  window.addEventListener('scroll', () => {
    document.getElementById('header').classList.toggle('scrolled', window.scrollY > 4);
  });

  let toastTimer;

  function handleClick(el, e) {
    const action = el.dataset.action;
    const url    = el.dataset.url;

    // 波紋效果
    const rect = el.getBoundingClientRect();
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    ripple.style.left = (e.clientX - rect.left - 100) + 'px';
    ripple.style.top  = (e.clientY - rect.top  - 100) + 'px';
    el.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);

    if (action === 'copy') {
      navigator.clipboard.writeText(url).then(() => {
        // 打勾動畫
        const check = el.querySelector('.check-flash');
        const badge = el.querySelector('.badge');
        badge.style.opacity = '0';
        check.classList.add('show');
        setTimeout(() => {
          check.classList.remove('show');
          badge.style.opacity = '1';
        }, 1200);

        // Toast
        showToast('✅ 已複製連結！');
      }).catch(() => {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
        showToast('✅ 已複製連結！');
      });
    } else {
      window.open(url, '_blank');
      showToast('↗️ 已開啟頁面');
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>
</body>
</html>
